<div class="card my-5 border-0 post-shadow" (click)="navigateToPost()">
    <span class="text-muted p-3 small">
        {{ postDate }} - {{ postAuthor }}
    </span>
    <div class="card-header border-0">
        <h5>
            {{ postTitle }}
        </h5>
    </div>
    <div class="card-body">
        <p>
            {{ postDescription }}
        </p>
        <a href="">
            Read more
        </a>
    </div>
</div>
