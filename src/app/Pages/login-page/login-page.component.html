<div class="d-flex align-items-center position-absolute wrapper">
    <form class="px-3 px-md-0" [formGroup]="loginForm">
        <h1 class="text-center">
            Login
        </h1>
        <div class="mb-3">
            <app-input [invalid]="!!(loginForm.invalid && loginForm.controls.email.errors)" id="email" label="Email"
                type="email" placeholder="Your e-mail" formControlName="email">
            </app-input>
            <span *ngIf="loginForm.invalid && loginForm.controls.email.errors" class="small text-danger">
                This e-mail is not valid
            </span>
        </div>
        <div class="mb-3">
            <app-input [invalid]="!!(loginForm.invalid && loginForm.controls.password.errors)" id="password"
                label="Password" type="password" placeholder="Your password" formControlName="password"></app-input>
            <span *ngIf="loginForm.invalid && loginForm.controls.password.errors" class="small text-danger">
                Password can't be empty
            </span>
        </div>
        <div class="d-flex justify-content-center">
            <button [class]="loading ? 'btn btn-primary disabled w-100' : 'btn btn-primary w-100'" (click)="submitForm($event)">
                <span class="spinner-border spinner-border-sm mx-2" *ngIf="loading"></span>
                <span *ngIf="!loading">Login</span>
            </button>
        </div>
        <div class="text-center mt-5">
            <a class="" [routerLink]="['']">
                Back to blogging
            </a>
        </div>
    </form>
</div>
<app-footer class="position-absolute bottom-0 w-100"></app-footer>
