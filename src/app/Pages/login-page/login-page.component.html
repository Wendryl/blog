<div class="d-flex align-items-center position-absolute wrapper">
    <form class="px-3 px-md-0">
        <h1 class="text-center">
            Login
        </h1>
        <div class="mb-3">
            <app-input label="Email" type="email" placeholder="Your e-mail"></app-input>
        </div>
        <div class="mb-3">
            <app-input label="Password" type="password" placeholder="Your password"></app-input>
        </div>
        <div class="d-flex justify-content-center">
            <button class="btn btn-light">Sign-up</button>
            <button class="btn btn-primary">Login</button>
        </div>
        <div class="text-center mt-5">
            <a  class="" [routerLink]="['']">
                Back to blogging
            </a>
        </div>
    </form>
</div>
<app-footer class="position-absolute bottom-0 w-100"></app-footer>
